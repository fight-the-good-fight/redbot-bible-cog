name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: bible/requirements.txt

      - name: Cache virtualenv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py311-${{ hashFiles('bible/requirements.txt') }}

      - name: Install dependencies
        run: make install

      - name: Run spellcheck
        run: make spellcheck

      - name: Run fmt
        run: |
          make fmt
          git diff --exit-code -- .

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

  coverage-comment:
    if: github.event_name == 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: bible/requirements.txt

      - name: Restore virtualenv cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .venv
          key: venv-${{ runner.os }}-py311-${{ hashFiles('bible/requirements.txt') }}

      - name: Install dependencies
        run: make install

      - name: Capture coverage summary
        id: coverage
        run: |
          {
            echo 'summary<<EOF'
            .venv/bin/python -m coverage report --skip-covered
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Comment coverage on PR
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- coverage-report -->
            ### Coverage report

            ```
            ${{ steps.coverage.outputs.summary }}
            ```
